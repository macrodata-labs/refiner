repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (uv)
        entry: uv run ruff check --force-exclude
        language: system
        types_or: [python, pyi]
        args: [--fix]
      - id: ruff-format
        name: ruff format (uv)
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
      - id: ty
        name: ty (uv)
        entry: uv run ty check
        language: system
        pass_filenames: false

