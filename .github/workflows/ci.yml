name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check --force-exclude .

      - name: Ruff format (check)
        run: uv run ruff format --force-exclude --check .

      - name: Type check
        run: uv run ty check

      - name: Tests
        env:
          PYTHONPATH: src
        run: uv run pytest
